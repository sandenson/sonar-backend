name: sonar-backend
services:
  sonar-database:
    image: postgres:latest
    container_name: sonar-database
    environment:
      POSTGRES_DB: ${PG_DB_NAME}
      POSTGRES_PASSWORD: ${PG_PASS}
      POSTGRES_USER: ${PG_USER}
    volumes:
      - ./data:/var/lib/postgresql/data
    ports:
      - 5432:${PG_PORT}
